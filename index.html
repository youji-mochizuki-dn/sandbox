<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カジノスロット - 5 REELS</title>
    <style>
        body {
            font-family: 'Georgia', 'Times New Roman', 'Hiragino Mincho ProN', serif;
            background-color: #1a0508;
            background-image: radial-gradient(#4a0e17 20%, #1a0508 80%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .casino-cabinet {
            background: linear-gradient(135deg, #2c080c 0%, #110204 100%);
            border: 6px double #d4af37;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(212, 175, 55, 0.3);
            text-align: center;
            width: 620px;
            position: relative;
        }

        /* イルミネーション風ヘッダー */
        h1 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 2.2rem;
            color: #f1c40f;
            text-shadow: 0 0 10px #f1c40f, 2px 2px 2px #000;
            letter-spacing: 5px;
            font-weight: bold;
        }

        /* ステータス表示 */
        .status-panel {
            display: flex;
            justify-content: space-around;
            background-color: #000;
            border: 3px solid #d4af37;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 1.3rem;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .status-item span {
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
        }

        .status-item .gold-text {
            color: #f39c12;
            text-shadow: 0 0 5px #f39c12;
        }

        /* スロット本体 (3段×5列) */
        .slot-grid {
            display: flex;
            justify-content: space-between;
            background-color: #222;
            border: 4px solid #b8860b;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 25px;
            background-image: linear-gradient(#111 50%, #222 50%);
            background-size: 100% 10px;
        }

        .reel-column {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 18%;
            background-color: #111;
            border-radius: 6px;
            padding: 2px;
        }

        .cell {
            height: 90px;
            background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%);
            color: #000;
            font-size: 3.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 4px 0;
            border-radius: 5px;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
            position: relative;
            user-select: none;
        }

        /* 回転中のブレ演出 */
        .spinning-cell {
            animation: blur-roll 0.06s infinite linear;
        }

        @keyframes blur-roll {
            0% { transform: translateY(-8px); filter: blur(3px); }
            50% { filter: blur(4px); }
            100% { transform: translateY(8px); filter: blur(3px); }
        }

        /* 当たりラインのバックライト点滅 */
        .hit-highlight {
            animation: hit-flash 0.3s infinite alternate;
            z-index: 2;
            box-shadow: 0 0 20px #f1c40f, inset 0 0 15px #f1c40f;
            border: 2px solid #fff;
        }

        @keyframes hit-flash {
            0% { background: #f1c40f; transform: scale(1.03); }
            100% { background: #ffffff; transform: scale(1.03); }
        }

        /* コントロール部分 */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .bet-info {
            font-size: 1.1rem;
            color: #bdc3c7;
            text-align: left;
            border-left: 3px solid #d4af37;
            padding-left: 10px;
            line-height: 1.4;
        }

        /* 豪快なゴールドスピンボタン */
        .spin-button {
            background: linear-gradient(to bottom, #f1c40f 0%, #d4af37 100%);
            color: #4a0e17;
            border: 2px solid #fff;
            padding: 15px 50px;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #967511, 0 10px 25px rgba(0,0,0,0.5);
            transition: all 0.05s;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }

        .spin-button:hover {
            background: linear-gradient(to bottom, #f39c12 0%, #b8860b 100%);
        }

            transform: translateY(4px);
            box-shadow: 0 2px 0 #967511, 0 5px 10px rgba(0,0
